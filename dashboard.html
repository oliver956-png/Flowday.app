<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FlowDay – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --green-mid: #639922;
    --teal-mid: #1D9E75;
    --text: #1a1a18;
    --muted: #5F5E5A;
    --border: #E8E8E4;
    --surface: #F7F9F4;
    --white: #ffffff;
    --error: #E24B4A;
    --premium: #F59E0B;
    --premium-light: #FEF3C7;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .phone-frame {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    max-height: 844px;
    background: var(--white);
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ==================== HEADER ==================== */
  .dash-header {
    background: var(--white);
    padding: 48px 20px 16px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .dash-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .dash-greeting small {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    display: block;
  }

  .dash-greeting strong {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    display: block;
  }

  .dash-avatar {
    width: 42px; height: 42px;
    border-radius: 100px;
    background: linear-gradient(135deg, var(--green-mid), var(--teal-mid));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700; color: white;
    cursor: pointer; flex-shrink: 0;
  }

  /* PROGRESSO */
  .progress-wrap {
    background: var(--surface);
    border-radius: 14px;
    padding: 12px 14px;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-top span { font-size: 12px; color: var(--muted); font-weight: 300; }
  .progress-top strong { font-size: 12px; color: var(--green); font-weight: 500; }

  .progress-bar {
    height: 6px; background: var(--border);
    border-radius: 100px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; border-radius: 100px;
    background: linear-gradient(90deg, var(--green-mid), var(--teal-mid));
    transition: width 0.5s ease;
  }

  .progress-msg { font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 300; }

  /* ==================== STATS ==================== */
  .stats-row {
    display: flex; gap: 8px;
    padding: 14px 20px 0;
    flex-shrink: 0;
  }

  .stat-card {
    flex: 1;
    background: var(--surface);
    border-radius: 14px;
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
  }

  .stat-emoji { font-size: 18px; }

  .stat-info strong {
    display: block; font-size: 13px;
    font-weight: 700; color: var(--text);
    letter-spacing: -0.3px; line-height: 1.2;
  }

  .stat-info small {
    font-size: 10px; color: var(--muted);
    font-weight: 300;
  }

  /* ==================== HÁBITOS ==================== */
  .dash-content {
    flex: 1; overflow-y: auto;
    padding: 16px 20px 100px;
  }

  .section-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--text); letter-spacing: -0.3px;
  }

  .section-link {
    font-size: 12px; color: var(--green);
    font-weight: 500; cursor: pointer;
    background: none; border: none;
    font-family: 'DM Sans', sans-serif;
  }

  .habit-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .habit-card.done {
    background: var(--green-light);
    border-color: rgba(99,153,34,0.25);
  }

  .habit-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--surface);
    display: flex; align-items: center;
    justify-content: center; font-size: 18px;
    flex-shrink: 0; transition: background 0.2s;
  }

  .habit-card.done .habit-icon { background: rgba(99,153,34,0.15); }

  .habit-info { flex: 1; }

  .habit-name {
    font-size: 14px; font-weight: 500;
    color: var(--text); display: block;
    transition: all 0.2s;
  }

  .habit-card.done .habit-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .habit-meta {
    font-size: 11px; color: var(--muted);
    font-weight: 300; display: block; margin-top: 1px;
  }

  .habit-check {
    width: 26px; height: 26px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
    font-size: 12px; color: white;
  }

  .habit-card.done .habit-check {
    background: var(--green-mid);
    border-color: var(--green-mid);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
  }

  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty-state-sub { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.6; }

  /* ==================== BOTTOM NAV ==================== */
  .bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 10px 8px 20px;
    z-index: 10;
  }

  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    cursor: pointer; border: none; background: none;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 0; transition: opacity 0.2s;
  }

  .nav-item-icon { font-size: 20px; line-height: 1; }
  .nav-item-label { font-size: 10px; color: var(--muted); font-weight: 400; }
  .nav-item.active .nav-item-label { color: var(--green); font-weight: 500; }

  .nav-add {
    width: 48px; height: 48px;
    background: var(--green);
    border-radius: 100px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; flex-shrink: 0;
    transition: background 0.2s; margin: 0 4px;
  }
  .nav-add:hover { background: #2d5509; }
  .nav-add svg { width: 22px; height: 22px; }

  /* ==================== MODAL PERFIL ==================== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 900;
    background: rgba(0,0,0,0.5);
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  .modal-sheet {
    background: var(--white); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 430px; max-height: 85vh;
    display: flex; flex-direction: column;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 100px; margin: 12px auto 0; flex-shrink: 0;
  }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }

  .modal-title {
    font-family: 'Syne', sans-serif; font-size: 17px;
    font-weight: 700; color: var(--text); letter-spacing: -0.3px;
  }

  .modal-close {
    background: var(--surface); border: none; width: 30px; height: 30px;
    border-radius: 100px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; color: var(--muted);
  }

  .modal-body { overflow-y: auto; padding: 20px; flex: 1; }

  /* Perfil */
  .profile-top {
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    padding: 8px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .profile-avatar {
    width: 72px; height: 72px; border-radius: 100px;
    background: linear-gradient(135deg, var(--green-mid), var(--teal-mid));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 700; color: white;
    margin-bottom: 12px;
  }

  .profile-name {
    font-family: 'Syne', sans-serif; font-size: 18px;
    font-weight: 800; color: var(--text); letter-spacing: -0.5px;
    margin-bottom: 2px;
  }

  .profile-email { font-size: 12px; color: var(--muted); font-weight: 300; }

  .profile-stats {
    display: flex; gap: 0;
    border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; margin-bottom: 20px;
  }

  .profile-stat {
    flex: 1; text-align: center; padding: 12px 8px;
    border-right: 1px solid var(--border);
  }
  .profile-stat:last-child { border-right: none; }

  .profile-stat strong {
    display: block; font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 800;
    color: var(--green); letter-spacing: -0.5px;
  }
  .profile-stat small { font-size: 10px; color: var(--muted); font-weight: 300; }

  .profile-menu { display: flex; flex-direction: column; gap: 8px; }

  .profile-menu-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px; border-radius: 14px;
    background: var(--surface); cursor: pointer;
    border: none; font-family: 'DM Sans', sans-serif;
    width: 100%; text-align: left; transition: background 0.2s;
  }
  .profile-menu-item:hover { background: var(--border); }

  .profile-menu-icon { font-size: 18px; width: 20px; text-align: center; }
  .profile-menu-label { font-size: 14px; font-weight: 400; color: var(--text); flex: 1; }
  .profile-menu-arrow { font-size: 14px; color: var(--muted); }

  .profile-menu-item.danger .profile-menu-label { color: var(--error); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text); color: white;
    padding: 12px 20px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: all 0.3s;
    white-space: nowrap; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.erro { background: var(--error); }

  @media (max-width: 430px) {
    body { padding: 0; background: var(--white); }
    .phone-frame { border-radius: 0; box-shadow: none; max-height: none; min-height: 100vh; }
  }
</style>
</head>
<body>

<!-- ==================== MODAL PERFIL ==================== -->
<div class="modal-overlay" id="modal-perfil">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Meu perfil</span>
      <button class="modal-close" onclick="fecharModal('modal-perfil')">✕</button>
    </div>
    <div class="modal-body">
      <div class="profile-top">
        <div class="profile-avatar" id="perfil-avatar">?</div>
        <div class="profile-name" id="perfil-nome">Carregando...</div>
        <div class="profile-email" id="perfil-email"></div>
      </div>
      <div class="profile-stats">
        <div class="profile-stat">
          <strong id="perfil-streak">0</strong>
          <small>dias seguidos</small>
        </div>
        <div class="profile-stat">
          <strong id="perfil-pontos">0</strong>
          <small>pontos</small>
        </div>
        <div class="profile-stat">
          <strong id="perfil-habitos">0</strong>
          <small>hábitos</small>
        </div>
      </div>
      <div class="profile-menu">
        <button class="profile-menu-item">
          <span class="profile-menu-icon">⚙️</span>
          <span class="profile-menu-label">Configurações</span>
          <span class="profile-menu-arrow">›</span>
        </button>
        <button class="profile-menu-item">
          <span class="profile-menu-icon">🔥</span>
          <span class="profile-menu-label">Assinar Premium</span>
          <span class="profile-menu-arrow">›</span>
        </button>
        <button class="profile-menu-item">
          <span class="profile-menu-icon">📧</span>
          <span class="profile-menu-label">Suporte</span>
          <span class="profile-menu-arrow">›</span>
        </button>
        <button class="profile-menu-item danger" onclick="handleLogout()">
          <span class="profile-menu-icon">🚪</span>
          <span class="profile-menu-label">Sair da conta</span>
          <span class="profile-menu-arrow">›</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ==================== PHONE FRAME ==================== -->
<div class="phone-frame">

  <!-- HEADER -->
  <div class="dash-header">
    <div class="dash-header-top">
      <div class="dash-greeting">
        <small id="dash-saudacao">Bom dia ✦</small>
        <strong id="dash-nome">Carregando...</strong>
      </div>
      <div class="dash-avatar" id="dash-avatar" onclick="abrirPerfil()">?</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <span>Progresso hoje</span>
        <strong id="prog-texto">0 de 0</strong>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <div class="progress-msg" id="prog-msg">Carregando seus hábitos...</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-emoji">🔥</span>
      <div class="stat-info">
        <strong id="stat-streak">0</strong>
        <small>dias seguidos</small>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-emoji">⭐</span>
      <div class="stat-info">
        <strong id="stat-pontos">0 pts</strong>
        <small>hoje</small>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-emoji">✅</span>
      <div class="stat-info">
        <strong id="stat-feitos">0</strong>
        <small>concluídos</small>
      </div>
    </div>
  </div>

  <!-- HÁBITOS -->
  <div class="dash-content">
    <div class="section-header">
      <span class="section-title">Seus hábitos</span>
      <button class="section-link" onclick="window.location.href='index.html'">Editar</button>
    </div>
    <div id="habitos-lista">
      <div class="empty-state">
        <div class="empty-state-icon">⏳</div>
        <div class="empty-state-title">Carregando...</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-item active">
      <span class="nav-item-icon">🏠</span>
      <span class="nav-item-label">Início</span>
    </button>
    <button class="nav-item">
      <span class="nav-item-icon">📊</span>
      <span class="nav-item-label">Progresso</span>
    </button>
    <button class="nav-add" onclick="showToast('Em breve: adicionar hábitos!')">
      <svg viewBox="0 0 22 22" fill="none">
        <path d="M11 4v14M4 11h14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="nav-item">
      <span class="nav-item-icon">🔔</span>
      <span class="nav-item-label">Lembretes</span>
    </button>
    <button class="nav-item" onclick="abrirPerfil()">
      <span class="nav-item-icon">👤</span>
      <span class="nav-item-label">Perfil</span>
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- ==================== FIREBASE ==================== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, updateDoc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAnHrVMhffLenUvPAjfiqMux3_riHrI7E",
    authDomain: "flowday-6beda.firebaseapp.com",
    projectId: "flowday-6beda",
    storageBucket: "flowday-6beda.firebasestorage.app",
    messagingSenderId: "247389659495",
    appId: "1:247389659495:web:d326e2ca46675d6ae88fc2",
    measurementId: "G-23CNYQJ2ZK"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const habitosInfo = {
    agua:        { emoji: '💧', nome: 'Beber água', meta: (m) => m?.['meta-agua-copos'] || '2L por dia' },
    sono:        { emoji: '😴', nome: 'Dormir no horário', meta: (m) => m?.['meta-sono-dormir'] ? `Dormir às ${m['meta-sono-dormir']}` : 'Regular o sono' },
    alimentacao: { emoji: '🥗', nome: 'Comer bem', meta: (m) => m?.['meta-alim-objetivo'] || 'Alimentação equilibrada' },
    movimento:   { emoji: '🚶', nome: 'Se movimentar', meta: (m) => m?.['meta-mov-minutos'] ? `${m['meta-mov-minutos']} de atividade` : '20 min por dia' },
    mental:      { emoji: '🧘', nome: 'Pausa mental', meta: (m) => m?.['meta-mental-minutos'] ? `${m['meta-mental-minutos']} de pausa` : '10 min de foco' },
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }

    const snap = await getDoc(doc(db, "usuarios", user.uid));
    if (!snap.exists() || !snap.data().onboardingFeito) {
      window.location.href = 'index.html'; return;
    }

    const dados = snap.data();
    const nome = dados.nome || user.displayName || 'Usuário';
    const inicial = nome.charAt(0).toUpperCase();

    // Header
    document.getElementById('dash-nome').textContent = `Olá, ${nome.split(' ')[0]}!`;
    document.getElementById('dash-avatar').textContent = inicial;
    document.getElementById('dash-saudacao').textContent = saudacao() + ' ✦';

    // Perfil modal
    document.getElementById('perfil-avatar').textContent = inicial;
    document.getElementById('perfil-nome').textContent = nome;
    document.getElementById('perfil-email').textContent = user.email;
    document.getElementById('perfil-streak').textContent = dados.streak || 0;
    document.getElementById('perfil-pontos').textContent = dados.pontos || 0;
    document.getElementById('stat-streak').textContent = (dados.streak || 0) + ' dias';
    document.getElementById('stat-pontos').textContent = (dados.pontos || 0) + ' pts';

    // Carregar hábitos
    const habitos = dados.habitos || [];
    const metas = dados.metas || {};
    const hoje = new Date().toISOString().split('T')[0];
    const feitos = dados.feitosHoje?.[hoje] || [];

    document.getElementById('perfil-habitos').textContent = habitos.length;
    renderHabitos(habitos, metas, feitos, hoje, user.uid, dados);
  });

  function renderHabitos(habitos, metas, feitos, hoje, uid, dados) {
    const lista = document.getElementById('habitos-lista');

    if (habitos.length === 0) {
      lista.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🌱</div>
          <div class="empty-state-title">Nenhum hábito ainda</div>
          <div class="empty-state-sub">Volte ao início e configure seus hábitos para começar sua jornada.</div>
        </div>`;
      atualizarProgresso(0, 0);
      return;
    }

    lista.innerHTML = '';
    habitos.forEach(id => {
      const info = habitosInfo[id];
      if (!info) return;
      const done = feitos.includes(id);
      const card = document.createElement('div');
      card.className = 'habit-card' + (done ? ' done' : '');
      card.innerHTML = `
        <div class="habit-icon">${info.emoji}</div>
        <div class="habit-info">
          <span class="habit-name">${info.nome}</span>
          <span class="habit-meta">${info.meta(metas[id])}</span>
        </div>
        <div class="habit-check">${done ? '✓' : ''}</div>
      `;
      card.onclick = () => toggleHabito(id, done, feitos, hoje, uid, habitos, metas, dados);
      lista.appendChild(card);
    });

    atualizarProgresso(feitos.length, habitos.length);
    document.getElementById('stat-feitos').textContent = feitos.length;
  }

  async function toggleHabito(id, done, feitos, hoje, uid, habitos, metas, dados) {
    let novosFeitos = [...feitos];
    if (done) {
      novosFeitos = novosFeitos.filter(f => f !== id);
    } else {
      novosFeitos.push(id);
    }

    const pontosGanhos = done ? -10 : 10;
    const novosPontos = Math.max(0, (dados.pontos || 0) + pontosGanhos);

    await updateDoc(doc(db, "usuarios", uid), {
      [`feitosHoje.${hoje}`]: novosFeitos,
      pontos: novosPontos
    });

    dados.pontos = novosPontos;
    document.getElementById('stat-pontos').textContent = novosPontos + ' pts';
    document.getElementById('perfil-pontos').textContent = novosPontos;
    renderHabitos(habitos, metas, novosFeitos, hoje, uid, dados);
  }

  function atualizarProgresso(feitos, total) {
    const pct = total === 0 ? 0 : Math.round((feitos / total) * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-texto').textContent = `${feitos} de ${total}`;
    document.getElementById('stat-feitos').textContent = feitos;

    let msg = 'Vamos lá! Cada hábito conta.';
    if (total === 0) msg = 'Configure seus hábitos para começar!';
    else if (pct === 100) msg = '🎉 Parabéns! Você completou todos hoje!';
    else if (pct >= 50) msg = '💪 Mais da metade! Continue assim!';
    document.getElementById('prog-msg').textContent = msg;
  }

  window.handleLogout = async function () {
    await signOut(auth);
    window.location.href = 'index.html';
  };

  function saudacao() {
    const h = new Date().getHours();
    if (h < 12) return 'Bom dia';
    if (h < 18) return 'Boa tarde';
    return 'Boa noite';
  }
</script>

<script>
  function abrirPerfil() { document.getElementById('modal-perfil').classList.add('active'); }
  function fecharModal(id) { document.getElementById(id).classList.remove('active'); }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', function(e) {
      if (e.target === this) fecharModal(this.id);
    });
  });

  function showToast(msg, erro = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('erro', erro);
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
